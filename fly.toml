# Fly.io configuration — https://fly.io/docs/reference/configuration/
app = "walkie-talkie-app"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  NO_HTTPS  = "true"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/api/health"
    timeout      = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
