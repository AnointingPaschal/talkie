<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b3a"/>
      <stop offset="100%" stop-color="#0c0f1d"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Outer ring glow -->
  <circle cx="256" cy="220" r="130" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="220" r="108" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.2"/>

  <!-- Microphone body -->
  <rect x="206" y="100" width="100" height="150" rx="50" fill="url(#grad1)" filter="url(#glow)"/>

  <!-- Microphone stand arc -->
  <path d="M166 220 Q166 320 256 320 Q346 320 346 220" fill="none" stroke="url(#grad2)" stroke-width="18" stroke-linecap="round"/>

  <!-- Stand pole -->
  <line x1="256" y1="320" x2="256" y2="380" stroke="url(#grad2)" stroke-width="18" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="196" y1="380" x2="316" y2="380" stroke="url(#grad1)" stroke-width="18" stroke-linecap="round"/>

  <!-- Signal waves (right side) -->
  <path d="M358 170 Q390 195 390 220 Q390 245 358 270" fill="none" stroke="#34d399" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  <path d="M378 148 Q424 183 424 220 Q424 257 378 292" fill="none" stroke="#34d399" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <path d="M398 128 Q458 173 458 220 Q458 267 398 312" fill="none" stroke="#34d399" stroke-width="8" stroke-linecap="round" opacity="0.35"/>

  <!-- Signal waves (left side) -->
  <path d="M154 170 Q122 195 122 220 Q122 245 154 270" fill="none" stroke="#818cf8" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  <path d="M134 148 Q88 183 88 220 Q88 257 134 292" fill="none" stroke="#818cf8" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  <path d="M114 128 Q54 173 54 220 Q54 267 114 312" fill="none" stroke="#818cf8" stroke-width="8" stroke-linecap="round" opacity="0.35"/>

  <!-- App name -->
  <text x="256" y="462" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="42" font-weight="700" fill="url(#grad1)" letter-spacing="2">S-TALK</text>
</svg>
